name: CI/CD

on:
  push:
    branches: [ "develop", "main" ]
    tags:
      - "v*"
  pull_request:
    branches: [ "develop", "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test-build-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.set-tag.outputs.image_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest

      - name: Set image tag
        id: set-tag
        run: echo "image_tag=sha-$(echo ${GITHUB_SHA} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: |
          SHORT_SHA=sha-$(echo ${GITHUB_SHA} | cut -c1-7)
          docker build \
            -t $REGISTRY/$IMAGE_NAME:$SHORT_SHA \
            -t $REGISTRY/$IMAGE_NAME:latest \
            .

      - name: Push SHA and latest tags
        if: github.event_name != 'pull_request'
        run: |
          SHORT_SHA=sha-$(echo ${GITHUB_SHA} | cut -c1-7)
          docker push $REGISTRY/$IMAGE_NAME:$SHORT_SHA
          docker push $REGISTRY/$IMAGE_NAME:latest

      - name: Push git tag as Docker tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION_TAG=${GITHUB_REF#refs/tags/}
          docker tag $REGISTRY/$IMAGE_NAME:sha-$(echo ${GITHUB_SHA} | cut -c1-7) $REGISTRY/$IMAGE_NAME:$VERSION_TAG
          docker push $REGISTRY/$IMAGE_NAME:$VERSION_TAG

  deploy-staging:
    if: github.ref == 'refs/heads/develop' && github.event_name != 'pull_request'
    needs: test-build-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to staging
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_PORT || 22 }}
          script: |
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.test-build-push.outputs.image_tag }}
            docker stop hello-cicd-staging || true
            docker rm hello-cicd-staging || true
            docker run -d \
              --name hello-cicd-staging \
              -p 5001:5000 \
              --restart unless-stopped \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.test-build-push.outputs.image_tag }}

  deploy-production:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: test-build-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_PORT || 22 }}
          script: |
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.test-build-push.outputs.image_tag }}
            docker stop hello-cicd-prod || true
            docker rm hello-cicd-prod || true
            docker run -d \
              --name hello-cicd-prod \
              -p 5000:5000 \
              --restart unless-stopped \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.test-build-push.outputs.image_tag }}